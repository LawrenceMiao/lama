# configs/training/data/satellite_256.yaml
# @package _group_

# Batch sizes - adjust based on GPU memory
# For 6-channel images: use smaller batches than RGB
batch_size: 8 # 6-channel needs more VRAM than 3-channel
val_batch_size: 4 # Validation can be smaller
num_workers: 4 # Parallel data loading (4-8 recommended)

train:
  # Location of training images
  # Your folder structure should be:
  # my_dataset/train/*.tif (or *.png, *.npy)
  indir: ${location.data_root_dir}/train

  # Image size for training (256x256 for your satellite patches)
  out_size: 256

  # Dataset type - use multichannel for 6-band images
  kind: multichannel
  n_channels: 6

  # Image file extension (.tif for geospatial, .png, or .npy for NumPy arrays)
  img_suffix: .npy

  # Use the same black/white mask image for every training sample.
  # White pixels are masked; black pixels remain visible.
  mask_generator_kind: fixed
  mask_gen_kwargs:
    path: mask.png

  # Augmentation type
  # Use multichannel_light for 6-channel data (CLAHE/HSV in light_distortions need uint8 RGB).
  # Options include: no_augs, multichannel_light, distortions_light (RGB-oriented)
  transform_variant: multichannel_light

  # DataLoader configuration
  dataloader_kwargs:
    batch_size: ${data.batch_size}
    shuffle: True # Shuffle training data
    num_workers: ${data.num_workers}
    pin_memory: True # Speed up GPU transfer

val:
  # Location of validation images
  # Contains pre-computed images and masks for consistency
  indir: ${location.data_root_dir}/val

  kind: multichannel
  n_channels: 6
  out_size: 256

  # For validation, use pre-generated fixed masks (unlike training which generates random ones)
  # Your val folder should have structure:
  # val/image1.tif, image1_mask.png
  # val/image2.tif, image2_mask.png
  img_suffix: .npy

  dataloader_kwargs:
    batch_size: ${data.val_batch_size}
    shuffle: False # Don't shuffle validation
    num_workers: ${data.num_workers}

visual_test:
  # Optional: Visual inspection set (100+ images)
  indir: ${location.data_root_dir}/visual_test
  kind: multichannel
  n_channels: 6
  img_suffix: .npy
  dataloader_kwargs:
    batch_size: ${data.val_batch_size}
    shuffle: False
    num_workers: ${data.num_workers}

eval:
  # Optional: Evaluation set for final metrics
  indir: ${location.data_root_dir}/eval
  kind: multichannel
  n_channels: 6
  img_suffix: .npy
  dataloader_kwargs:
    batch_size: ${data.val_batch_size}
    shuffle: False
    num_workers: ${data.num_workers}
