# configs/training/lama-fourier-satellite.yaml
run_title: "LaMa FFC for 8-channel satellites"

training_model:
  kind: default
  concat_mask: true
  # Required for default directory visualizer (discr_output_* in key_order); matches lama-fourier.yaml
  store_discr_outputs_for_vis: true

losses:
  l1:
    weight_missing: 10
    weight_known: 10
  perceptual:
    weight: 0 # Disabled for multi-channel
  adversarial:
    kind: r1
    weight: 10
  feature_matching:
    weight: 100
  resnet_pl:
    weight: 0 # Disabled for multi-channel

defaults:
  - location: my_location
  - data: satellite_256 # Use new satellite config
  - generator: ffc_resnet_satellite
  - discriminator: nlayer_satellite
  - optimizers: default_optimizers
  - visualizer: directory
  - evaluator: satellite_multichannel
  - trainer: any_gpu_large_ssim_ddp_final
